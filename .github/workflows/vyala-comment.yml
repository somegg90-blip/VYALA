name: VYALA – Post PR Comment

on:
  workflow_run:
    workflows: ["VYALA PQC Scan (PR)"]
    types:
      - completed

permissions:
  pull-requests: write
  actions: read

jobs:
  comment:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Download CBOM artifact
        uses: actions/download-artifact@v4
        with:
          name: vyala-cbom-${{ github.event.workflow_run.pull_requests[0].number }}
          path: /tmp
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Post PR comment using prebuilt action image
        uses: docker://ghcr.io/somegg90-blip/vyala-action:latest
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          severity-threshold: medium
          post-comment: true
        env:
          CBOM_FILE: /tmp/vyala-cbom.json
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          HEAD_SHA: ${{ github.event.workflow_run.pull_requests[0].head.sha }}