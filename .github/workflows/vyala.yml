name: VYALA PQC Scan (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  actions: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run VYALA scan (no comment on fork PRs)
        uses: ./
        with:
          post-comment: false
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload CBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: vyala-cbom-${{ github.run_id }}
          path: vyala-cbom.json
          retention-days: 1
