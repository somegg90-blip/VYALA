name: VYALA PQC Scan (PR)

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: read
  actions: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Write PR metadata
        run: |
          echo "${{ github.event.pull_request.number }}" > /tmp/pr_number.txt
          echo "${{ github.event.pull_request.head.sha }}" > /tmp/head_sha.txt

      - name: Upload CBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: vyala-cbom-${{ github.run_id }}
          path: |
            /tmp/vyala-cbom.json
            /tmp/pr_number.txt
            /tmp/head_sha.txt
          retention-days: 1
