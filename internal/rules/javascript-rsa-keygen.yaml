rules:
  - id: pqc-rsa-keygen-javascript
    languages: [javascript, typescript]
    message: "RSA key generation detected – not quantum-resistant"
    severity: WARNING
    pattern-either:
      - pattern: crypto.generateKeyPair('rsa', ...)
      - pattern: crypto.generateKeyPair("rsa", ...)
      - pattern: "subtle.generateKey({name: 'RSASSA-PKCS1-v1_5',...}, ...)"
      - pattern: "subtle.generateKey({name: 'RSA-PSS',...}, ...)"
      - pattern: "subtle.generateKey({name: 'RSA-OAEP',...}, ...)"
    metadata:
      category: rsa_keygen
      algorithm: RSA
      suggested_replacement: "Replace with a PQC/hybrid scheme. For JS: use a Web Crypto extension or a library like pqcrypto (liboqs.js) for ML-KEM."
    paths:
      include:
        - "*.js"
        - "*.ts"
        - "*.jsx"
        - "*.tsx"
