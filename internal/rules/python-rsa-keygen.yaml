rules:
  - id: pqc-rsa-keygen-python
    languages: [python]
    message: "RSA key generation detected – not quantum-resistant"
    severity: WARNING
    pattern-either:
      - pattern: rsa.generate_private_key(...)
      - pattern: RSA.generate(...)
      - pattern: Crypto.PublicKey.RSA.generate(...)
      - pattern: cryptography.hazmat.primitives.asymmetric.rsa.generate_private_key(...)
    metadata:
      category: rsa_keygen
      algorithm: RSA
      suggested_replacement: "Replace with ML-KEM (e.g., CRYSTALS-Kyber) using a hybrid construction. For Python: consider liboqs-python with hybrid key exchange."
    paths:
      include:
        - "*.py"